name: build-desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            sep: ':'
            artifact: CFD-incomp-macos
          - os: windows-latest
            sep: ';'
            artifact: CFD-incomp-windows
          - os: ubuntu-latest
            sep: ':'
            artifact: CFD-incomp-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        shell: bash
        run: |
          pyinstaller --noconfirm --clean --onefile --name CFD-incomp \
            --add-data "app/static${{ matrix.sep }}app/static" \
            --collect-all numba \
            --collect-all llvmlite \
            --collect-all scipy \
            --collect-all shapely \
            --hidden-import app.solver \
            launch.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
